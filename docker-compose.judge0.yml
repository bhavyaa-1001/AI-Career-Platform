# Free local code execution — no API key or credit card required.
# Start: docker compose -f docker-compose.judge0.yml up -d
# API:   http://localhost:2358
# Stop:  docker compose -f docker-compose.judge0.yml down

x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 50M

services:
  judge0-server:
    image: judge0/judge0:latest
    container_name: ai-career-judge0
    volumes:
      - ./docker/judge0/judge0.conf:/judge0.conf:ro
    ports:
      - '2358:2358'
    privileged: true
    depends_on:
      - judge0-db
      - judge0-redis
    <<: *default-logging
    restart: unless-stopped

  judge0-worker:
    image: judge0/judge0:latest
    container_name: ai-career-judge0-worker
    command: ['./scripts/workers']
    volumes:
      - ./docker/judge0/judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-db
      - judge0-redis
    <<: *default-logging
    restart: unless-stopped

  judge0-db:
    image: postgres:16.2
    container_name: ai-career-judge0-db
    env_file: docker/judge0/judge0.conf
    volumes:
      - judge0_data:/var/lib/postgresql/data
    <<: *default-logging
    restart: unless-stopped

  judge0-redis:
    image: redis:7.2.4
    container_name: ai-career-judge0-redis
    command: ['bash', '-c', 'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"']
    env_file: docker/judge0/judge0.conf
    <<: *default-logging
    restart: unless-stopped

volumes:
  judge0_data:
