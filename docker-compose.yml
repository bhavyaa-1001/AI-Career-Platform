services:
  mongo:
    image: mongo:7
    container_name: ai-career-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_career_platform

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-career-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/ai_career_platform
      NODE_ENV: development
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai-career-client
    restart: unless-stopped
    ports:
      - '5173:5173'
    env_file:
      - ./client/.env
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
